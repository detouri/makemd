name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-main:
    runs-on: ubuntu-latest
    outputs:
      ref_name: ${{ steps.tag.outputs.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag points to main
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main."
            exit 1
          fi

  build:
    needs: verify-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.verify-main.outputs.ref_name }}
        run: |
          mkdir -p dist
          output="dist/makemd_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w -X github.com/detouri/makemd/internal/cli.version=${VERSION}" -o "$output" ./cmd
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip "makemd_${GOOS}_${GOARCH}.zip" "makemd_${GOOS}_${GOARCH}${{ matrix.ext }}")
          else
            tar -C dist -czf "dist/makemd_${GOOS}_${GOARCH}.tar.gz" "makemd_${GOOS}_${GOARCH}${{ matrix.ext }}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: makemd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/makemd_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}

  publish:
    needs:
      - verify-main
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: makemd-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ needs.verify-main.outputs.ref_name }}" release-artifacts/* \
            --generate-notes \
            --title "${{ needs.verify-main.outputs.ref_name }}"
